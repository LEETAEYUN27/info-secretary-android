name: Build Release AAB & APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Generate signing keystore
      run: |
        keytool -genkeypair \
          -v \
          -storetype JKS \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass infosecretary2026 \
          -keypass infosecretary2026 \
          -alias info-secretary \
          -keystore app/release-keystore.jks \
          -dname "CN=Info Secretary, OU=App, O=InfoSecretary, L=Seoul, ST=Seoul, C=KR"

    - name: Build Release AAB (Play Store)
      run: ./gradlew bundleRelease

    - name: Build Release APK (Direct Install)
      run: ./gradlew assembleRelease

    - name: Upload AAB (Play Store 제출용)
      uses: actions/upload-artifact@v4
      with:
        name: play-store-aab
        path: app/build/outputs/bundle/release/app-release.aab

    - name: Upload APK (직접 설치용)
      uses: actions/upload-artifact@v4
      with:
        name: direct-install-apk
        path: app/build/outputs/apk/release/app-release.apk
